<!DOCTYPE html>

    <!-- Google Fonts -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: {
                            300: '#f6e5a3',
                            400: '#f0d67b',
                            500: '#d4a843',

    <style>
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes lanternGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 4px rgba(246, 229, 163, 0.4));
            }

            50% {
                filter: drop-shadow(0 0 10px rgba(246, 229, 163, 0.7));
            }
        }

        .anim-up {
            animation: fadeInUp 0.7s ease-out both;
        }

        .anim-fade {
            animation: fadeIn 0.8s ease-out both;
        }

        .anim-scale {
            animation: scaleIn 0.7s ease-out both;
        }

        .shimmer {
            animation: shimmer 3s ease-in-out infinite;
        }

        .lantern-glow {
            animation: lanternGlow 3s ease-in-out infinite;
        }

        .d1 {
            animation-delay: 0.1s;
        }

        .d2 {
            animation-delay: 0.2s;
        }

        .d3 {
            animation-delay: 0.35s;
        }

        .d4 {
            animation-delay: 0.5s;
        }

        .d5 {
            animation-delay: 0.65s;
        }

        .d6 {
            animation-delay: 0.8s;
        }

        .d7 {
            animation-delay: 0.95s;
        }

        /* Gold photo frame */
        .photo-gold-frame {
            box-shadow:
                0 0 0 3px rgba(212, 168, 67, 0.6),
                0 0 0 6px rgba(212, 168, 67, 0.2),
                0 0 24px rgba(212, 168, 67, 0.15),
                0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Background subtle pattern */
        .bg-pattern {
            background-image:
                radial-gradient(circle at 50% 50%, rgba(212, 168, 67, 0.03) 0%, transparent 70%);

</head>
